<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>流式传输测试</title>
  <style>
    body { font-family: system-ui; max-width: 700px; margin: 50px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 10px; padding: 10px 24px; font-size: 16px; cursor: pointer; }
    #output { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 8px; min-height: 100px; white-space: pre-wrap; }
    .cursor::after { content: '▊'; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <h2>🤖 流式传输测试</h2>
  <input id="input" type="text" placeholder="输入你的问题..." value="用三句话介绍人工智能">
  <button onclick="send()">发送</button>
  <div id="output"></div>

  <script>
    async function send() {
      const msg = document.getElementById('input').value;
      const output = document.getElementById('output');
      output.innerHTML = '';
      output.classList.add('cursor');

      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6); // 去掉 "data: " 前缀
          if (data === '[DONE]') break;
          try {
            const { content } = JSON.parse(data);
            if (content) output.innerHTML += content;
          } catch {}
        }
      }
      output.classList.remove('cursor');
    }
  </script>
</body>
</html>
